name: fix_crm_new
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  dio: ^5.5.0+1
  pretty_dio_logger: ^1.3.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  flutter_screenutil: ^5.9.3
  pinput: ^6.0.2
  shared_preferences: ^2.5.3
  go_router: ^17.0.0
  connectivity_plus: ^7.1.1
  package_info_plus: ^9.0.1
  lottie: ^3.3.1
  pdf: ^3.11.3
  printing: ^5.14.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/fixcrm-appicon2.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: assets/icons/fixcrm-appicon2.png
  android_12:
    image: assets/icons/fixcrm-appicon2.png
    color: "#ffffff"

flutter:
  uses-material-design: true


  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/
